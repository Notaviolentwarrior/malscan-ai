services:
  - type: pserv
    name: malscan-analyzer
    runtime: docker
    plan: starter
    dockerfilePath: ./analyzer/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ANALYZER_MODEL_DIR
        value: /app/models
      - key: ANALYZER_MODEL_FILENAME
        value: EMBER2024_PE.model
      - key: ANALYZER_MALICIOUS_THRESHOLD
        value: "0.5"

  - type: web
    name: malscan-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_UPLOAD_DIR
        value: /tmp/malscan/uploads/quarantine
      - key: APP_ANALYZER_BASE_URL
        fromService:
          type: pserv
          name: malscan-analyzer
          property: hostport
