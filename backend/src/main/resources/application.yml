server:
  port: ${PORT:8080}

spring:
  application:
    name: malscan-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/malscan_ai}

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  upload-dir: ${APP_UPLOAD_DIR:uploads/quarantine}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  analyzer:
    base-url: ${APP_ANALYZER_BASE_URL:http://localhost:8000}
